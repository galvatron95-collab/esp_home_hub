name: TTS Server
version: "0.2.0"
slug: tts_server
description: Azure TTS WebSocket server with READY-gated handshake for ESP32 audio clients.
url: https://github.com/galvatron95-collab/esp_home_hub
arch:
  - amd64
startup: services
boot: auto
init: false
hassio_api: true
ports:
  8765/tcp: 8765
  8766/tcp: 8766
ports_description:
  8765/tcp: WebSocket port for ESP32 clients
  8766/tcp: STT transcript ingress from ESP32 clients
services:
  - mqtt:want
options:
  azure_key: ""
  azure_region: ""
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic: tts/response
  ws_port: 8765
schema:
  azure_key: password
  azure_region: str
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str
  mqtt_password: password
  mqtt_topic: str
  ws_port: port
