# Doorbell audio output — ESP32 + passive piezo on GPIO 23.
# Hardware per CLAUDE.md §2. Driven by ESPHome rtttl output;
# exposed to HA as a single button entity (button.play_chime) that
# plays a fixed ding-dong melody when pressed. Replaces the original
# active-buzzer `switch.buzzer` per refusal #1's narrow carve-out.
# Module contract: CLAUDE.md §5 "Audio output (doorbell chime)".

esphome:
  name: doorbell-buzzer
  friendly_name: Doorbell Buzzer
  min_version: 2025.4.0

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

# Encrypted native API to Home Assistant. Required by CLAUDE.md refusal #11.
api:
  encryption:
    key: !secret api_encryption_key

# OTA via ESPHome's native mechanism. After first USB flash, subsequent
# deploys reach the device over the LAN.
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Modem sleep disabled per CLAUDE.md refusal #10.
  power_save_mode: NONE

# ESP32 hardware PWM channel on GPIO 23 — required by the rtttl
# component to generate audio tones on the passive piezo.
output:
  - platform: ledc
    id: rtttl_out
    pin: GPIO23

# RTTTL tone player. Drives the ledc output above. No state to
# restore at boot — silent at boot is the natural rest state of a
# passive piezo with the PWM channel idle.
rtttl:
  output: rtttl_out

# HA-facing entity. Pressing this button plays the single v1 chime
# (single-chime constraint per CLAUDE.md refusal #1).
button:
  - platform: template
    name: Play Chime
    on_press:
      - rtttl.play: "Ding:d=4,o=7,b=180:e,c"

# DHT11 temp/humidity sensor on GPIO 4 (CLAUDE.md §2). Dashboard-
# visibility-only per refusal #1's narrow carve-out. accuracy_decimals
# and round filters set to 0 to match the DHT11's actual integer
# accuracy — see §5 "Environmental sensor (DHT11)" forbidden clause.
sensor:
  - platform: dht
    model: DHT11
    pin: GPIO4
    temperature:
      name: Temperature
      accuracy_decimals: 0
      filters:
        - round: 0
    humidity:
      name: Humidity
      accuracy_decimals: 0
      filters:
        - round: 0
    update_interval: 60s
